name: Stick Transfer Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Static analysis ───────────────────────────────────────────────────────
      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      # ── Unit tests ────────────────────────────────────────────────────────────
      - name: Unit tests (Vitest)
        run: pnpm test:unit -- --reporter=verbose

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.GRAPHQL_URL_TEST || 'http://localhost:4000/graphql' }}

      # ── E2E tests (push to main/develop only) ─────────────────────────────────
      - name: Install Playwright browsers
        if: github.event_name == 'push'
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        if: github.event_name == 'push'
        run: pnpm test:e2e
        env:
          # GraphQL calls are intercepted by page.route() mocks — no real backend needed.
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
