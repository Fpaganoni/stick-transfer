name: Scordd Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Static analysis ───────────────────────────────────────────────────────
      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      # ── Unit tests ────────────────────────────────────────────────────────────
      - name: Unit tests (Vitest)
        run: pnpm test:unit --reporter=verbose

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.GRAPHQL_URL_TEST || 'http://localhost:4000/graphql' }}

      # ── E2E tests (push to main/develop only) ─────────────────────────────────
      - name: Install Playwright browsers
        if: github.event_name == 'push'
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate E2E secrets
        if: github.event_name == 'push'
        run: |
          if [ -z "$GRAPHQL_URL_TEST" ]; then
            echo "::error::Secret GRAPHQL_URL_TEST not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
        env:
          GRAPHQL_URL_TEST: ${{ secrets.GRAPHQL_URL_TEST }}

      - name: Start app for E2E
        if: github.event_name == 'push'
        run: pnpm start &
        env:
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.GRAPHQL_URL_TEST }}

      - name: E2E tests (Playwright)
        if: github.event_name == 'push'
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.GRAPHQL_URL_TEST }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright report
        if: failure() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
